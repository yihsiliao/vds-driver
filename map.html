<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 司機即時分布地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f6f8; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .back-btn {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: #ffffff; border: 2px solid #ccc; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); text-decoration: none; color: #333;
        }
        .leaflet-popup-content { font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <a href="./index.html" class="back-btn">🔙 返回打卡</a>
    
    <div id="map"></div>

    <script>
        // ★★★ 務必將這裡替換成您的 Google Apps Script 網址 ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyD0PoIElZYUiD8Es8Jzo9cft4gKYWIWtM-ejjED3UQJcv8YwyF7SbhaPRajqyC0WsQ/exec";
        
        // 1. 初始化地圖
        const map = L.map('map').setView([23.7, 120.4], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        Promise.all([
            fetch(GAS_URL + "?op=drivers").then(res => res.json()),
            fetch(GAS_URL + "?op=fields").then(res => res.json())
        ]).then(([drivers, fields]) => {
            
            const fieldMap = {};
            fields.forEach(f => {
                let parts = f.info.split('/');
                let fieldId = parts[0] ? parts[0].trim().toUpperCase() : "";
                if (fieldId && f.coords) {
                    let firstCoord = f.coords.split(';')[0].split(',');
                    let lat = parseFloat(firstCoord[0]);
                    let lon = parseFloat(firstCoord[1]);
                    if (!isNaN(lat) && !isNaN(lon)) fieldMap[fieldId] = [lat, lon];
                }
            });

            let bounds = []; // ★ 用來記錄所有圖釘位置，做自動縮放

            drivers.forEach(d => {
                let locStr = d.loc || ""; 
                let coords = null;
                
                let match = locStr.match(/-([A-Z0-9]+)/i);
                if (locStr.includes("田間") && match && fieldMap[match[1].toUpperCase()]) {
                    coords = fieldMap[match[1].toUpperCase()];
                } 
                else if (d.exactGps) {
                    coords = d.exactGps;
                }
                else if (locStr.includes("公司")) coords = [23.684650530868296, 120.25181901583427];
                else if (locStr.includes("東勢")) coords = [23.67, 120.25];

                if (coords) {
                    // ★ 解決重疊問題：加入微小的隨機偏移量 (約 10~30 公尺)
                    // 這樣同在「公司」的司機，圖釘會稍微散開，不會疊死！
                    let offsetLat = coords[0] + (Math.random() - 0.5) * 0.002;
                    let offsetLon = coords[1] + (Math.random() - 0.5) * 0.002;
                    
                    bounds.push([offsetLat, offsetLon]);
                    
                    let marker = L.marker([offsetLat, offsetLon]).addTo(map);
                    
                    // ★ 組合資訊框：加入車牌判斷
                    let plateHtml = d.plate ? `🚛 車牌：<b>${d.plate}</b><br>` : "";
                    
                    marker.bindPopup(`👤 <b>${d.driver}</b><br>${plateHtml}📍 ${d.status}<br>🕒 狀態：${d.time}`);
                }
            });

            // ★ 自動縮放：將所有圖釘完美收進畫面中
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
            } else {
                alert("目前沒有在外執勤的司機，或無法解析位置。");
            }

        }).catch(err => {
            alert("載入地圖資料失敗，請檢查網路連線或 GAS 網址是否正確。");
        });
    </script>
</body>
</html>
