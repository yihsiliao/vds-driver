<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 司機即時分布地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f6f8; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .back-btn {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: #ffffff; border: 2px solid #ccc; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); text-decoration: none; color: #333;
        }
        .leaflet-popup-content { font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <a href="./index.html" class="back-btn">🔙 返回打卡</a>
    
    <div id="map"></div>

    <script>
        // ★★★ 務必將這裡替換成您的 Google Apps Script 網址 ★★★
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyD0PoIElZYUiD8Es8Jzo9cft4gKYWIWtM-ejjED3UQJcv8YwyF7SbhaPRajqyC0WsQ/exec";
        
        // 1. 初始化地圖 (預設視角：雲林縣)
        const map = L.map('map').setView([23.7, 120.4], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. 同時向後端抓取「司機狀態」與「農地多邊形座標」
        Promise.all([
            fetch(GAS_URL + "?op=drivers").then(res => res.json()),
            fetch(GAS_URL + "?op=fields").then(res => res.json())
        ]).then(([drivers, fields]) => {
            
            // 建立農地字典 (利用 A001 找座標)
            const fieldMap = {};
            fields.forEach(f => {
                let parts = f.info.split('/');
                let fieldId = parts[0] ? parts[0].trim().toUpperCase() : "";
                if (fieldId && f.coords) {
                    // 抓取多邊形的第一個點作為圖釘的位置
                    let firstCoord = f.coords.split(';')[0].split(',');
                    let lat = parseFloat(firstCoord[0]);
                    let lon = parseFloat(firstCoord[1]);
                    if (!isNaN(lat) && !isNaN(lon)) fieldMap[fieldId] = [lat, lon];
                }
            });

            // 3. 把司機放上地圖
            let hasDrivers = false;
            drivers.forEach(d => {
                let locStr = d.loc || ""; 
                let coords = null;
                
                // A. 如果地點有農地編號 (例如：田間(東勢)-C095)
                let match = locStr.match(/-([A-Z0-9]+)/i);
                if (match && fieldMap[match[1].toUpperCase()]) {
                    coords = fieldMap[match[1].toUpperCase()];
                } 
                // B. 如果地點在公司
                else if (locStr.includes("公司")) {
                    coords = [23.7, 120.4]; // ★ 您可以把這裡改成真實公司的經緯度
                }

                // 若有找到座標，插上圖釘
                if (coords) {
                    hasDrivers = true;
                    let marker = L.marker(coords).addTo(map);
                    // 點擊圖釘跳出的資訊框
                    marker.bindPopup(`🚗 <b>${d.driver}</b><br>📍 ${d.status}<br>🕒 狀態更新：${d.time}`).openPopup();
                }
            });

            if (!hasDrivers) {
                alert("目前沒有在外執勤的司機，或無法解析司機位置。");
            }

        }).catch(err => {
            alert("載入地圖資料失敗，請檢查網路連線或 GAS 網址是否正確。");
        });
    </script>
</body>
</html>
