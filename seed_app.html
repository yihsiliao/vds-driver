<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>🌱 VDS 智慧農業管理系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --bg-color: #f4f6f8; --card-bg: #ffffff; --text-color: #2c3e50; --border-color: #dce1e6; --input-bg: #ffffff; --label-color: #34495e; --sub-text: #7f8c8d; --primary: #2E7D32; --secondary: #f39c12; --outbound: #d35400; --plant: #8e44ad; --return: #2980b9; --mat-in: #16a085; --mat-out: #c0392b; }
    body { background-color: var(--bg-color); padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text-color); margin: 0; }
    
    /* APP 主選單設計 */
    .home-header { text-align: center; margin-top: 20px; margin-bottom: 30px; }
    .home-header h2 { color: var(--text-color); margin: 0 0 5px 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 480px; margin: 0 auto; }
    .menu-card { background: white; border-radius: 20px; padding: 30px 15px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s; }
    .menu-card:active { transform: scale(0.95); }
    .menu-icon { font-size: 45px; margin-bottom: 12px; }
    .menu-title { font-size: 18px; font-weight: 900; color: var(--text-color); }
    .menu-subtitle { font-size: 13px; color: var(--sub-text); margin-top: 5px; }
    .menu-disabled { opacity: 0.6; cursor: not-allowed; background: #e9ecef; }
    
    /* 返回按鈕 */
    .back-btn { background: none; border: none; color: var(--text-color); font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; padding: 10px; border-radius: 10px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 480px; margin-left: auto; margin-right: auto; }
    
    /* 作業畫面共用設計 */
    .tab-container { display: flex; gap: 5px; margin-bottom: 20px; max-width: 480px; margin-left: auto; margin-right: auto; flex-wrap: wrap; }
    .tab-btn { flex: 1 1 22%; height: 45px; border-radius: 10px; border: 2px solid var(--border-color); background: white; font-size: 13px; font-weight: bold; color: var(--sub-text); cursor: pointer; transition: 0.3s; padding: 0; }
    
    /* 種子模組顏色 */
    .tab-btn.active.seed-inbound { background: var(--primary); color: white; border-color: var(--primary); }
    .tab-btn.active.seed-outbound { background: var(--outbound); color: white; border-color: var(--outbound); }
    .tab-btn.active.seed-return { background: var(--return); color: white; border-color: var(--return); }
    .tab-btn.active.seed-plant { background: var(--plant); color: white; border-color: var(--plant); }
    
    /* 資材模組顏色 */
    .tab-btn.active.mat-inbound { background: var(--mat-in); color: white; border-color: var(--mat-in); }
    .tab-btn.active.mat-apply { background: var(--mat-out); color: white; border-color: var(--mat-out); }

    .card { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 480px; margin: 0 auto; box-sizing: border-box; border: 1px solid var(--border-color); }
    h3 { text-align: center; margin: 0 0 5px 0; font-weight: 800; font-size: 24px; letter-spacing: 1px; }
    .sub-title { font-size: 13px; color: var(--sub-text); font-weight: 500; text-align: center; display: block; margin-bottom: 20px; }
    
    label { display: block; font-weight: 700; margin-top: 15px; margin-bottom: 8px; font-size: 16px; color: var(--label-color); }
    select, input[type="text"], input[type="date"], input[type="number"], textarea { width: 100%; font-size: 17px; font-weight: 600; border: 2px solid var(--border-color); border-radius: 12px; background-color: var(--input-bg); padding-left: 15px; box-sizing: border-box; }
    select, input[type="text"], input[type="date"], input[type="number"] { height: 55px; }
    textarea { padding: 15px; font-family: monospace; line-height: 1.5; resize: none; color: #16a085; background-color: #f8f9fa; }
    
    .scan-btn { background: linear-gradient(135deg, #34495e, #2c3e50); color: white; border: none; border-radius: 12px; height: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    
    /* 相機上傳按鈕樣式 */
    .camera-upload-btn { background: linear-gradient(135deg, #f39c12, #d35400); color: white; border: none; border-radius: 12px; height: 60px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); position: relative; overflow: hidden; }
    .camera-upload-btn input[type="file"] { position: absolute; top: 0; left: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    #image-preview { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 10px; display: none; border: 2px solid var(--border-color); }

    .submit-btn { color: white; border: none; border-radius: 15px; height: 70px; width: 100%; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.2; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
    .custom-input { display: none; margin-top: 8px; border-color: var(--secondary) !important; background-color: #fffdf5 !important; }
    
    #loading-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { width: 45px; height: 45px; border: 5px solid var(--border-color); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #success-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10001; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .success-card { background: white; width: 100%; max-width: 360px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
    .success-header { color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; }
    .success-body { padding: 20px; font-size: 15px; color: #333; line-height: 1.6; white-space: pre-wrap; background-color: #f9f9f9; font-family: monospace; }
    .success-footer { padding: 20px; text-align: center; display: flex; flex-direction: column; gap: 12px; }
    .btn-print { background: #0288D1; color: white; border: none; border-radius: 12px; height: 60px; font-size: 18px; font-weight: bold; display: flex; justify-content: center; align-items: center; text-decoration: none; }
    .btn-close { background: #95a5a6; color: white; border: none; border-radius: 12px; height: 50px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .scan-count-badge { background-color: #e74c3c; color: white; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 5px; display: none; }
  </style>
</head>
<body>

<div id="loading-mask"><div class="spinner"></div><div id="loading-text" style="font-weight:bold; color:#2E7D32;">系統處理中...</div></div>
<div id="success-modal"><div class="success-card"><div id="modal-title" class="success-header">🎉 處理成功！</div><div id="success-content" class="success-body">加載中...</div><div class="success-footer"><a id="btn-print-link" href="#" target="_blank" class="btn-print" style="display:none;">🖨️ 開啟標籤並列印</a><button class="btn-close" onclick="closeSuccessModal()">返回繼續作業</button></div></div></div>

<div id="home-view">
    <div class="home-header">
        <h2>VDS 智慧農業系統</h2>
        <span class="sub-title">Hệ thống Quản lý VDS</span>
    </div>
    <div class="menu-grid">
        <div class="menu-card" onclick="openModule('seed')">
            <div class="menu-icon">🌱</div>
            <div class="menu-title">種子作業</div>
            <div class="menu-subtitle">倉儲與田間綁定</div>
        </div>
        <div class="menu-card" onclick="openModule('mat')">
            <div class="menu-icon">🧪</div>
            <div class="menu-title">肥料與農藥</div>
            <div class="menu-subtitle">免換標與用藥紀錄</div>
        </div>
        <div class="menu-card menu-disabled" onclick="alert('🔧 模組開發中，敬請期待！')">
            <div class="menu-icon">🚜</div>
            <div class="menu-title">採收作業</div>
            <div class="menu-subtitle">田間採收與地磅</div>
        </div>
        <div class="menu-card menu-disabled" onclick="alert('🔧 模組開發中，敬請期待！')">
            <div class="menu-icon">📦</div>
            <div class="menu-title">理貨與出貨</div>
            <div class="menu-subtitle">包裝溯源條碼</div>
        </div>
    </div>
</div>

<div id="seed-module" style="display: none;">
    <button class="back-btn" onclick="goHome()">⬅️ 返回主選單</button>
    <div class="tab-container">
        <button class="tab-btn active seed-inbound" onclick="switchTab('seed', 'inbound')">📦 進貨</button>
        <button class="tab-btn seed-outbound" onclick="switchTab('seed', 'outbound')">🚜 領用</button>
        <button class="tab-btn seed-return" onclick="switchTab('seed', 'return')">🔄 歸還</button>
        <button class="tab-btn seed-plant" onclick="switchTab('seed', 'plant')">🌍 種植</button>
    </div>

    <div id="seed-inbound-section" class="card">
        <h3 style="color: var(--primary);">🌱 種子進貨入庫</h3>
        <label>📅 進貨日期</label><input type="date" id="inbound-date">
        <label>📸 1. 原廠種子條碼</label>
        <button class="scan-btn" onclick="scanSingleBarcode('original-barcode')">📷 掃描原廠條碼</button>
        <input type="text" id="original-barcode" placeholder="可掃描，也可手動輸入條碼...">
        <label>🥕 2. 品種名稱</label>
        <select id="seed-variety" onchange="checkCustom('seed-variety')">
            <option value="" disabled selected>請選擇品種...</option><option value="日本黑田五寸">日本黑田五寸</option><option value="向陽二號">向陽二號</option><option value="custom">✏️ 其他 (自行輸入)</option>
        </select>
        <input type="text" id="seed-variety-custom" class="custom-input" placeholder="請輸入品種">
        <label>🏢 3. 供應廠商</label>
        <select id="seed-vendor" onchange="checkCustom('seed-vendor')">
            <option value="" disabled selected>請選擇廠商...</option><option value="生生種苗">生生種苗</option><option value="農友種苗">農友種苗</option><option value="custom">✏️ 其他 (自行輸入)</option>
        </select>
        <input type="text" id="seed-vendor-custom" class="custom-input" placeholder="請輸入廠商">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>📦 箱數</label><input type="number" id="box-qty" value="1" min="1" style="text-align:center;"></div>
            <div><label>🥫 每箱罐數</label><input type="number" id="cans-per-box" value="50" min="1" style="text-align:center;"></div>
        </div>
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--primary), #1b5e20);" onclick="submitSeedInbound()"><span>📤 生成批號與標籤</span></button>
    </div>

    <div id="seed-outbound-section" class="card" style="display: none;">
        <h3 style="color: var(--outbound);">🚜 倉庫批次領用</h3>
        <label>📅 領用日期</label><input type="date" id="outbound-date">
        <label>📸 掃描種子身分證 <span id="outbound-count" class="scan-count-badge">已掃 0 罐</span></label>
        <button class="scan-btn" onclick="scanMultiBarcode('vds-outbound-barcodes', 'outbound-count')" style="background: linear-gradient(135deg, #d35400, #a04000);">📷 連掃 VDS 標籤</button>
        <textarea id="vds-outbound-barcodes" rows="5" placeholder="可掃描，也可手動輸入條碼 (每行一個)..."></textarea>
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--outbound), #a04000);" onclick="submitSeedAction('種子領用_寫入', 'outbound-date', 'vds-outbound-barcodes', 'seed-outbound')"><span>🚜 確認批次出庫</span></button>
    </div>

    <div id="seed-return-section" class="card" style="display: none;">
        <h3 style="color: var(--return);">🔄 退回冰庫歸還</h3>
        <label>📅 歸還日期</label><input type="date" id="return-date">
        <label>📸 掃描種子身分證 <span id="return-count" class="scan-count-badge">已掃 0 罐</span></label>
        <button class="scan-btn" onclick="scanMultiBarcode('vds-return-barcodes', 'return-count')" style="background: linear-gradient(135deg, #2980b9, #1f618d);">📷 連掃 VDS 標籤</button>
        <textarea id="vds-return-barcodes" rows="5" placeholder="可掃描，也可手動輸入條碼 (每行一個)..."></textarea>
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--return), #1f618d);" onclick="submitSeedAction('種子歸還_寫入', 'return-date', 'vds-return-barcodes', 'seed-return')"><span>🔄 確認退回在庫</span></button>
    </div>

    <div id="seed-plant-section" class="card" style="display: none;">
        <h3 style="color: var(--plant);">🌍 田間批次綁定</h3>
        <label>📅 實際種植日期</label><input type="date" id="plant-date">
        <label>📸 掃描準備種下的種子 <span id="plant-count" class="scan-count-badge">已掃 0 罐</span></label>
        <button class="scan-btn" onclick="scanMultiBarcode('vds-plant-barcodes', 'plant-count')" style="background: linear-gradient(135deg, #8e44ad, #5b2c6f);">📷 連掃罐上 QR Code</button>
        <textarea id="vds-plant-barcodes" rows="5" placeholder="可掃描，也可手動輸入條碼 (每行一個)..."></textarea>
        <label>📍 綁定農地編號</label>
        <select id="field-number" onchange="checkCustom('field-number')">
            <option value="" disabled selected>請選擇農地...</option><option value="A區-01">A區-01</option><option value="A區-02">A區-02</option><option value="custom">✏️ 其他 (自行輸入)</option>
        </select>
        <input type="text" id="field-number-custom" class="custom-input" placeholder="請輸入農地編號">
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--plant), #5b2c6f);" onclick="submitSeedPlanting()"><span>🌍 確認種植並綁定</span></button>
    </div>
</div>

<div id="mat-module" style="display: none;">
    <button class="back-btn" onclick="goHome()">⬅️ 返回主選單</button>
    <div class="tab-container" style="max-width: 300px;">
        <button class="tab-btn active mat-inbound" onclick="switchTab('mat', 'inbound')">📦 資材進貨</button>
        <button class="tab-btn mat-apply" onclick="switchTab('mat', 'apply')">🚜 田間施用</button>
    </div>

    <div id="mat-inbound-section" class="card">
        <h3 style="color: var(--mat-in);">🧪 肥料農藥進貨建檔</h3>
        <span class="sub-title">Nhập kho Vật tư (免印標籤)</span>
        
        <label>📅 進貨日期</label><input type="date" id="mat-inbound-date">
        
        <label>📸 1. 掃描原廠條碼 (一維條碼)</label>
        <button class="scan-btn" style="background: linear-gradient(135deg, #16a085, #0e6655);" onclick="scanSingleBarcode('mat-barcode')">📷 掃描包裝條碼</button>
        <input type="text" id="mat-barcode" placeholder="可掃描，也可手動輸入條碼...">
        
        <label>🏷️ 2. 資材種類</label>
        <select id="mat-type">
            <option value="" disabled selected>請選擇種類...</option>
            <option value="肥料">🌱 肥料</option>
            <option value="農藥">🧪 農藥 / 防治資材</option>
        </select>
        
        <label>✏️ 3. 品名與規格</label>
        <input type="text" id="mat-name" placeholder="例如：特優根肥料 20kg">
        
        <label>➕ 4. 進貨數量 (總量)</label>
        <input type="number" id="mat-qty" value="1" min="1">
        
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--mat-in), #0e6655);" onclick="submitMatInbound()"><span>📦 確認資材入庫</span></button>
    </div>

    <div id="mat-apply-section" class="card" style="display: none;">
        <h3 style="color: var(--mat-out);">🚜 田間施用紀錄</h3>
        <span class="sub-title">Sử dụng Vật tư (支援拍照存證)</span>
        
        <label>📅 施用日期</label><input type="date" id="mat-apply-date">
        
        <label>📸 1. 掃描使用的資材條碼</label>
        <button class="scan-btn" style="background: linear-gradient(135deg, #c0392b, #922b21);" onclick="scanSingleBarcode('mat-apply-barcode')">📷 掃描包裝條碼</button>
        <input type="text" id="mat-apply-barcode" placeholder="可掃描，也可手動輸入...">
        
        <label>📍 2. 施用農地編號</label>
        <select id="mat-field-number" onchange="checkCustom('mat-field-number')">
            <option value="" disabled selected>請選擇施用農地...</option><option value="A區-01">A區-01</option><option value="A區-02">A區-02</option><option value="custom">✏️ 其他 (自行輸入)</option>
        </select>
        <input type="text" id="mat-field-number-custom" class="custom-input" placeholder="請輸入農地編號">
        
        <label>➖ 3. 施用數量 (扣除量)</label>
        <input type="number" id="mat-apply-qty" value="1" min="1" step="0.5">
        
        <label>📸 4. 現場作業拍照 (產銷履歷存檔)</label>
        <div class="camera-upload-btn">
            📷 點擊開啟相機拍照
            <input type="file" accept="image/*" capture="environment" onchange="compressAndPreviewImage(event)">
        </div>
        <img id="image-preview" src="" alt="照片預覽">
        
        <button class="submit-btn" style="background: linear-gradient(135deg, var(--mat-out), #922b21);" onclick="submitMatApply()"><span>🚜 確認施用並上傳</span></button>
    </div>
</div>

<script>
const LIFF_ID = "2009601199-exo5jfDe"; 
const GAS_URL = "https://script.google.com/macros/s/AKfycbz0awiapo_XZJ_BmF52MNVLTi2OwOfPsBRl-VjtdvcNslWDLsA-YBdgmbWKO6GxECnF/exec"; 

// 儲存壓縮後的照片 Base64 字串
let currentCompressedImage = "";

window.onload = function() {
    // 預設填入今天日期
    ['inbound-date', 'outbound-date', 'return-date', 'plant-date', 'mat-inbound-date', 'mat-apply-date'].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).valueAsDate = new Date();
    });
    liff.init({ liffId: LIFF_ID }).then(() => { if (!liff.isLoggedIn()) liff.login(); }).catch(err => console.error(err));
};

// ================= 介面導航邏輯 =================
function openModule(moduleId) {
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('seed-module').style.display = 'none';
    document.getElementById('mat-module').style.display = 'none';
    document.getElementById(moduleId + '-module').style.display = 'block';
    window.scrollTo(0,0);
}
function goHome() {
    document.getElementById('seed-module').style.display = 'none';
    document.getElementById('mat-module').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    window.scrollTo(0,0);
}

function switchTab(module, tab) {
    // 隱藏該模組的所有 section
    const sections = document.querySelectorAll(`#${module}-module .card`);
    sections.forEach(sec => sec.style.display = 'none');
    
    // 取消該模組的所有按鈕 active
    const btns = document.querySelectorAll(`#${module}-module .tab-btn`);
    btns.forEach(btn => btn.classList.remove('active'));
    
    // 顯示指定的 section 和 active
    document.getElementById(`${module}-${tab}-section`).style.display = 'block';
    document.querySelector(`.${module}-${tab}`).classList.add('active');
}

function checkCustom(type) {
    var sel = document.getElementById(type), inp = document.getElementById(type + '-custom');
    if (sel.value === 'custom') { inp.style.display = 'block'; inp.focus(); } else { inp.style.display = 'none'; inp.value = ''; }
}

// ================= 條碼掃描功能 =================
function scanSingleBarcode(targetInputId) {
    if (liff.isInClient() && liff.isApiAvailable('scanCodeV2')) {
        liff.scanCodeV2().then(result => { document.getElementById(targetInputId).value = result.value; }).catch(err => {});
    } else {
        if (!liff.isInClient()) document.getElementById(targetInputId).value = "TEST-BARCODE-" + Math.floor(Math.random() * 100);
        else alert("❌ 需在手機 LINE APP 使用！");
    }
}

function scanMultiBarcode(textareaId, countBadgeId) {
    if (liff.isInClient() && liff.isApiAvailable('scanCodeV2')) {
        liff.scanCodeV2().then(result => {
            let val = result.value.trim();
            let el = document.getElementById(textareaId);
            let currentList = el.value ? el.value.split('\n') : [];
            if (currentList.includes(val)) { alert("⚠️ 這罐【" + val + "】已經在清單裡囉！不用重複掃。"); } 
            else {
                currentList.push(val); el.value = currentList.join('\n');
                let badge = document.getElementById(countBadgeId);
                badge.innerText = "已掃 " + currentList.length + " 罐"; badge.style.display = "inline-block";
            }
            setTimeout(() => { scanMultiBarcode(textareaId, countBadgeId); }, 500);
        }).catch(err => {});
    } else {
        if (!liff.isInClient()) {
            let el = document.getElementById(textareaId); let randomId = "VDS-TEST-" + Math.floor(Math.random() * 100);
            el.value = el.value ? el.value + '\n' + randomId : randomId;
            document.getElementById(countBadgeId).innerText = "已掃 " + el.value.split('\n').length + " 罐"; document.getElementById(countBadgeId).style.display = "inline-block";
        } else alert("❌ 需在手機 LINE APP 使用！");
    }
}

// ================= 📸 照片壓縮黑科技 (前端處理) =================
function compressAndPreviewImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    showLoading("照片壓縮中...");
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;
        img.onload = function() {
            // 建立虛擬畫布進行縮圖
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
            let width = img.width; let height = img.height;

            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 轉成 JPEG 格式，品質 0.6 (大幅縮小檔案)
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            
            // 顯示在畫面上給阿姨看
            const preview = document.getElementById('image-preview');
            preview.src = dataUrl;
            preview.style.display = 'block';
            
            // 移除 'data:image/jpeg;base64,' 前綴，只保留純編碼給 GAS
            currentCompressedImage = dataUrl.split(',')[1];
            hideLoading(false);
        }
    }
}

// ================= 🚀 API 呼叫區塊 =================

// 【種子模組 API】
function submitSeedInbound() {
    var date = document.getElementById('inbound-date').value;
    var barcode = document.getElementById('original-barcode').value.trim();
    var vSelect = document.getElementById('seed-variety'); var variety = vSelect.value === 'custom' ? document.getElementById('seed-variety-custom').value.trim() : vSelect.value;
    var venSelect = document.getElementById('seed-vendor'); var vendor = venSelect.value === 'custom' ? document.getElementById('seed-vendor-custom').value.trim() : venSelect.value;
    var boxes = parseInt(document.getElementById('box-qty').value) || 0; var cans = parseInt(document.getElementById('cans-per-box').value) || 0;

    if (!barcode || !variety || !vendor) return alert("❌ 請確認欄位皆已填寫！");
    let totalCans = boxes * cans;
    if (!confirm(`確定入庫：共 ${totalCans} 罐？`)) return;

    showLoading("正在生成 PDF 標籤檔案...");
    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "種子進貨_寫入", date, barcode, variety, vendor, boxes, cansPerBox: cans, totalCans }) })
    .then(res => res.json()).then(data => handleResponse(data, "seed-inbound")).catch(() => hideLoading(true));
}

function submitSeedAction(actionName, dateId, textareaId, type) {
    var date = document.getElementById(dateId).value;
    var barcodes = document.getElementById(textareaId).value.trim().split('\n').filter(Boolean);
    if (barcodes.length === 0) return alert("❌ 請先點擊相機掃描至少一罐種子！");
    if (!confirm(`確定要批次處理這 ${barcodes.length} 罐種子嗎？`)) return;

    showLoading(`正在批次處理中...`);
    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: actionName, date: date, vdsBarcodes: barcodes }) })
    .then(res => res.json()).then(data => handleResponse(data, type)).catch(() => hideLoading(true));
}

function submitSeedPlanting() {
    var date = document.getElementById('plant-date').value;
    var barcodes = document.getElementById('vds-plant-barcodes').value.trim().split('\n').filter(Boolean);
    var fSelect = document.getElementById('field-number'); var fieldNum = fSelect.value === 'custom' ? document.getElementById('field-number-custom').value.trim() : fSelect.value;
    if (barcodes.length === 0 || !fieldNum) return alert("❌ 請掃描種子並選擇農地！");
    if (!confirm(`確定要將 ${barcodes.length} 罐種子種在【 ${fieldNum} 】嗎？`)) return;

    showLoading("正在綁定農地資料...");
    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "種子種植_寫入", date: date, vdsBarcodes: barcodes, fieldNum: fieldNum }) })
    .then(res => res.json()).then(data => handleResponse(data, "seed-plant")).catch(() => hideLoading(true));
}

// 【🧪 資材模組 API】
function submitMatInbound() {
    var date = document.getElementById('mat-inbound-date').value;
    var barcode = document.getElementById('mat-barcode').value.trim();
    var type = document.getElementById('mat-type').value;
    var name = document.getElementById('mat-name').value.trim();
    var qty = parseFloat(document.getElementById('mat-qty').value) || 0;

    if (!barcode || !type || !name || qty <= 0) return alert("❌ 請確認所有欄位都填寫且數量大於 0！");
    if (!confirm(`確定將【${name}】共 ${qty} 單位入庫嗎？\n(此操作會直接增加總庫存)`)) return;

    showLoading("正在更新資材總庫存...");
    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "資材進貨_寫入", date, barcode, type, name, qty }) })
    .then(res => res.json()).then(data => handleResponse(data, "mat-inbound")).catch(() => hideLoading(true));
}

function submitMatApply() {
    var date = document.getElementById('mat-apply-date').value;
    var barcode = document.getElementById('mat-apply-barcode').value.trim();
    var fSelect = document.getElementById('mat-field-number');
    var fieldNum = fSelect.value === 'custom' ? document.getElementById('mat-field-number-custom').value.trim() : fSelect.value;
    var qty = parseFloat(document.getElementById('mat-apply-qty').value) || 0;

    if (!barcode || !fieldNum || qty <= 0) return alert("❌ 請確認掃描了資材、選擇了農地，且數量大於 0！");
    
    // 檢查是否有拍照 (建議產銷履歷都要拍，但我們先設為提醒而不強制阻擋)
    if (!currentCompressedImage) {
        if(!confirm("⚠️ 您尚未上傳現場照片，確定要直接送出嗎？")) return;
    }

    if (!confirm(`確定在【${fieldNum}】施用了 ${qty} 單位的資材嗎？\n(此操作將扣除庫存並建立履歷)`)) return;

    showLoading("正在建立履歷與上傳照片 (請稍候)...");
    fetch(GAS_URL, { 
        method: 'POST', 
        body: JSON.stringify({ 
            action: "資材施用_寫入", 
            date: date, 
            barcode: barcode, 
            fieldNum: fieldNum, 
            qty: qty,
            imageBase64: currentCompressedImage // 傳送壓縮後的照片編碼
        }) 
    })
    .then(res => res.json()).then(data => handleResponse(data, "mat-apply")).catch(() => hideLoading(true));
}

// ================= UI 畫面處理 =================
function showLoading(text) { document.getElementById('loading-text').innerText = text; document.getElementById('loading-mask').style.display = 'flex'; }
function hideLoading(error) { document.getElementById('loading-mask').style.display = 'none'; if(error) alert("⚠️ 連線失敗，請檢查網路。"); }

function handleResponse(data, type) {
    hideLoading(false);
    let titleEl = document.getElementById('modal-title');
    
    // 依據不同情境給予標題與顏色
    if (type === "seed-inbound") { titleEl.innerText = "🎉 入庫成功！"; titleEl.style.background = "linear-gradient(135deg, #2E7D32, #1b5e20)"; } 
    else if (type === "seed-outbound") { titleEl.innerText = "🚜 批次領用完成"; titleEl.style.background = "linear-gradient(135deg, #d35400, #a04000)"; } 
    else if (type === "seed-return") { titleEl.innerText = "🔄 批次歸還完成"; titleEl.style.background = "linear-gradient(135deg, #2980b9, #1f618d)"; }
    else if (type === "seed-plant") { titleEl.innerText = "🌍 批次綁定完成"; titleEl.style.background = "linear-gradient(135deg, #8e44ad, #5b2c6f)"; }
    else if (type === "mat-inbound") { titleEl.innerText = "📦 資材建檔成功"; titleEl.style.background = "linear-gradient(135deg, #16a085, #0e6655)"; }
    else if (type === "mat-apply") { titleEl.innerText = "🚜 施用紀錄已建立"; titleEl.style.background = "linear-gradient(135deg, #c0392b, #922b21)"; }
    
    let msg = data.msg || data.messageText;
    let urlMatch = msg.match(/(https:\/\/drive\.google\.com[^\s]+)/);
    let pdfUrl = urlMatch ? urlMatch[0] : "";
    document.getElementById('success-content').innerText = msg.replace(/(https:\/\/drive\.google\.com[^\s]+)/, "").trim();
    
    let printBtn = document.getElementById('btn-print-link');
    if(type === "seed-inbound" && pdfUrl) { printBtn.href = pdfUrl; printBtn.style.display = "flex"; } else { printBtn.style.display = "none"; }
    
    document.getElementById('success-modal').style.display = 'flex';
}

function closeSuccessModal() {
    document.getElementById('success-modal').style.display = 'none';
    // 清空輸入框
    ['original-barcode', 'vds-outbound-barcodes', 'vds-return-barcodes', 'vds-plant-barcodes', 'mat-barcode', 'mat-apply-barcode'].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).value = '';
    });
    // 清空照片預覽
    document.getElementById('image-preview').style.display = 'none';
    document.getElementById('image-preview').src = '';
    currentCompressedImage = "";
    document.querySelectorAll('.scan-count-badge').forEach(badge => badge.style.display = 'none');
}
